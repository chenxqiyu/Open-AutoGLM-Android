name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 项目使用了 Android Gradle Plugin 8.x+，必须使用 Java 17
      JAVA_VERSION: '17'

    steps:
      # 1. 检出代码
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Java 17 环境
      # 这是编译 compileSdk=36 和使用 Gradle 8.11 的硬性要求
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle' # 开启 Gradle 缓存，加速二次构建

      # 3. 赋予 Gradle 脚本执行权限
      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 接受 Android SDK 许可协议
      # 因为 compileSdk = 36 (Android 16 Preview) 是非常新的版本，
      # 必须显式接受许可，否则 SDK 自动下载会失败。
      - name: 📝 Accept Android SDK Licenses
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # 5. 编译 Debug APK
      # Gradle 会自动处理 Hilt (KSP) 代码生成和 SDK 下载
      - name: 🏗️ Build with Gradle
        run: ./gradlew assembleDebug --stacktrace
        
      - name: 发布apk
        run: |
          TAG="build-${{ github.run_id }}"
          gh release create "$TAG" --target "${{ github.sha }}" --title "Build ${{ github.run_id }}"
          gh release upload "$TAG" app/build/outputs/apk/debug/*.apk
          # gh release upload "$TAG" dist/openlink_*.tar.gz dist/openlink_*.zip || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # # 6. 上传 APK 产物
      # - name: ⬆️ Upload APK Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: FlutterLibChecker-Debug
      #     # 根据 Gradle 标准输出路径
      #     path: app/build/outputs/apk/debug/*.apk
      #     retention-days: 7
